services:
  proxy:
    image: nginx:1.27-alpine
    ports:
        - 8080:8080
        - 8083:8081
        - 8084:8082
    networks:
      backup_proxy:
        ipv4_address: 172.22.0.10
    volumes:
      - ./config/proxy/http:/etc/nginx/conf.d
      - ./config/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
  server1:
    build: ./Dockerfiles/ubuntu
    container_name: server1
    hostname: server1
    restart: always
    volumes:
      - ./data/server1:/server1files
      - ./data/server1/files/public_html:/var/www/html
      - ./config/proxy/webserver.conf:/etc/nginx/sites-enabled/default:ro
    ports:
      - "8081:80"
    networks:
      backup_proxy:
        ipv4_address: 172.22.0.11
  server2:
    build: ./Dockerfiles/ubuntu
    container_name: server2
    hostname: server2
    restart: always
    volumes:
      - ./data/server2:/server2files
      - ./data/server2/files/public_html:/var/www/html
      - ./config/proxy/webserver.conf:/etc/nginx/sites-enabled/default:ro
    ports:
      - "8082:80"
    networks:
      backup_proxy:
        ipv4_address: 172.22.0.12
  backup:
    build: ./Dockerfiles/ubuntu
    container_name: backup
    hostname: backup
    restart: always
    cap_add:
      - SYS_ADMIN
    volumes:
      - ./config/rsnapshot/rsnapshot.conf:/etc/rsnapshot.conf:ro
      - ./config/cron/crontab:/etc/cron.d/rsnapshot:ro
      - ./config/rsnapshot:/var/log/rsnapshot:rw
      - ./data/backup/snapshots:/snapshots
    networks:
      backup_proxy:
        ipv4_address: 172.22.0.13
networks:
  backup_proxy:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.22.0.0/16
